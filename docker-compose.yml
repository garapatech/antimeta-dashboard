services:
  datasette:
    image: ghcr.io/nayetdet/datasette:latest
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M
    ports:
      - target: 6767
        published: 6767
        protocol: tcp
        mode: ingress
    volumes:
      - type: bind
        source: ./data
        target: /app/data
    environment:
      TZ: ${TZ}
